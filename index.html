<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0d12;
  --panel:#10131a;
  --surface:#161b26;
  --surface2:#1e2433;
  --border:#252d3d;
  --border2:#2d3650;
  --accent:#3b82f6;
  --accent-glow:rgba(59,130,246,0.25);
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Outfit',sans-serif;
}

html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column;height:100vh}

/* ══ PWA ══ */
#pwa-install-btn{
  display:none;align-items:center;gap:6px;
  height:30px;padding:0 12px;border-radius:6px;
  font-size:12.5px;font-family:var(--sans);font-weight:600;
  background:linear-gradient(135deg,#f59e0b,#ef4444);
  color:#fff;border:none;cursor:pointer;
  margin-right:8px;transition:all .15s;white-space:nowrap;
  box-shadow:0 0 12px rgba(245,158,11,.3);
}
#pwa-install-btn.visible{display:flex}
#pwa-install-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
#pwa-install-btn svg{width:13px;height:13px}
#offline-banner{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#ef4444;color:#fff;font-family:var(--mono);
  font-size:12px;text-align:center;padding:6px 0;
}
#offline-banner.visible{display:block}

/* ══ TOPBAR ══ */
#topbar{
  height:48px;flex-shrink:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0;gap:0;
  position:relative;z-index:50;
}

#logo{
  display:flex;align-items:center;
  padding:0 16px;height:100%;
  border-right:1px solid var(--border);
  flex-shrink:0;
}

.topbar-section{display:flex;align-items:center;gap:4px;padding:0 10px;height:100%}
.topbar-section+.topbar-section{border-left:1px solid var(--border)}

.tb-btn{
  display:flex;align-items:center;gap:6px;
  height:30px;padding:0 12px;border-radius:6px;
  font-size:12.5px;font-family:var(--sans);font-weight:600;
  border:none;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}

.tb-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.tb-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}

.tb-run{
  background:var(--accent);color:#fff;
  box-shadow:0 0 16px var(--accent-glow);
}
.tb-run:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}
.tb-run:active{transform:translateY(0)}

.spacer{flex:1}

/* status */
#status-wrap{display:flex;align-items:center;gap:8px;padding:0 16px}
#status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 7px rgba(34,197,94,.7);
  transition:all .3s;flex-shrink:0;
}
#status-dot.loading{background:var(--amber);box-shadow:0 0 7px rgba(245,158,11,.7);animation:blink 1s infinite}
#status-dot.error{background:var(--red);box-shadow:0 0 7px rgba(239,68,68,.7)}
#status-text{font-size:11.5px;font-family:var(--mono);color:var(--text3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* autorun toggle */
.toggle-wrap{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);cursor:pointer;padding:0 10px}
.toggle-wrap input{display:none}
.toggle{
  width:32px;height:17px;border-radius:9px;
  background:var(--border2);position:relative;transition:.2s;flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;left:2px;top:2px;
  width:13px;height:13px;border-radius:50%;
  background:#fff;transition:.2s;
}
.toggle-wrap input:checked+.toggle{background:var(--accent)}
.toggle-wrap input:checked+.toggle::after{left:17px}

/* ══ MAIN ══ */
#main{flex:1;display:flex;overflow:hidden;position:relative}

/* ══ EDITOR SIDE ══ */
#editor-side{
  width:50%;min-width:180px;
  display:flex;flex-direction:column;
  background:var(--panel);
  border-right:none;
  overflow:hidden;flex-shrink:0;
}

#editor-titlebar{
  height:34px;flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;padding:0 14px;
}
.titlebar-label{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.titlebar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
#line-col,#char-info{font-size:11px;font-family:var(--mono);color:var(--text3)}

/* CodeMirror host */
#cm-host{
  flex:1;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
}

/* Override CodeMirror default styles for our dark theme */
.cm-editor{
  height:100%;
  font-family:var(--mono)!important;
  font-size:13px!important;
  line-height:1.65!important;
  background:var(--panel)!important;
  outline:none!important;
}
.cm-editor.cm-focused{outline:none!important}
.cm-scroller{overflow:auto!important;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.cm-scroller::-webkit-scrollbar{width:7px;height:7px}
.cm-scroller::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.cm-scroller::-webkit-scrollbar-track{background:transparent}

.cm-gutters{
  background:var(--bg)!important;
  border-right:1px solid var(--border)!important;
  color:var(--text3)!important;
  min-width:52px;
}
.cm-lineNumbers .cm-gutterElement{padding:0 10px 0 6px!important;font-size:12px}
.cm-activeLineGutter{background:var(--surface)!important;color:var(--text2)!important}
.cm-activeLine{background:rgba(255,255,255,0.025)!important}
.cm-cursor{border-left-color:var(--accent)!important;border-left-width:2px!important}
.cm-selectionBackground{background:rgba(59,130,246,0.2)!important}
.cm-content{caret-color:var(--accent)!important;padding:8px 0!important}

/* HTML syntax colors */
.tok-tagName{color:#f472b6}
.tok-angleBracket,.tok-punctuation{color:#64748b}
.tok-attributeName{color:#60a5fa}
.tok-attributeValue,.tok-string{color:#86efac}
.tok-comment{color:#475569;font-style:italic}
.tok-doctype,.tok-meta{color:#a78bfa}
.tok-keyword{color:#c084fc}
.tok-propertyName{color:#60a5fa}
.tok-number{color:#fb923c}
.tok-operator{color:#94a3b8}
.tok-variableName{color:#e2e8f0}
.tok-typeName{color:#34d399}
.tok-unit{color:#fb923c}
.tok-color{color:#86efac}
.tok-url{color:#60a5fa;text-decoration:underline}
.tok-bool{color:#f472b6}
.tok-null{color:#f472b6}
.tok-className{color:#34d399}
.tok-definition.tok-variableName{color:#e2e8f0}

/* ══ DIVIDER ══ */
#divider{
  width:5px;background:var(--border);
  cursor:col-resize;flex-shrink:0;
  position:relative;z-index:10;transition:background .15s;
}
#divider:hover,#divider.active{background:var(--accent)}

/* ══ PREVIEW SIDE ══ */
#preview-side{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-width:180px;background:#fff;
}

#browser-bar{
  height:40px;flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;padding:0 12px;
}
.br-dots{display:flex;gap:5px;flex-shrink:0}
.brd{width:11px;height:11px;border-radius:50%;cursor:default}
.brd-r{background:#ff5f57}.brd-y{background:#febc2e}.brd-g{background:#28c840}

.br-nav-btn{
  background:transparent;border:none;
  color:var(--text3);cursor:pointer;
  padding:4px 5px;border-radius:5px;
  display:flex;align-items:center;transition:.15s;
}
.br-nav-btn:hover{background:var(--border2);color:var(--text2)}
.br-nav-btn svg{width:13px;height:13px}

.br-url{
  flex:1;height:26px;
  background:var(--bg);border:1px solid var(--border2);border-radius:5px;
  display:flex;align-items:center;padding:0 9px;gap:6px;overflow:hidden;
}
.br-url svg{width:11px;height:11px;color:var(--green);flex-shrink:0}
.br-url-text{font-family:var(--mono);font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.br-action-btn{
  background:transparent;border:none;
  color:var(--text3);cursor:pointer;
  padding:4px 5px;border-radius:5px;
  display:flex;align-items:center;transition:.15s;
}
.br-action-btn:hover{background:var(--border2);color:var(--text2)}
.br-action-btn svg{width:13px;height:13px}

#preview-frame{
  flex:1;border:none;
  display:block;background:#fff;
  width:100%;
}

/* ══ STATUSBAR ══ */
#statusbar{
  height:26px;flex-shrink:0;
  background:var(--accent);
  display:flex;align-items:center;gap:0;
  padding:0;
}
.sb-item{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-family:var(--mono);
  color:rgba(255,255,255,.85);font-weight:500;
  padding:0 14px;height:100%;
}
.sb-item svg{width:11px;height:11px}
.sb-sep{width:1px;height:14px;background:rgba(255,255,255,.2)}
.sb-right{margin-left:auto}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:9px 18px;border-radius:8px;
  font-size:12.5px;font-family:var(--mono);
  opacity:0;pointer-events:none;z-index:9999;
  transition:all .22s;white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

// ─────────────────────────────────────────────────────────────
// Preview logic — uses a debounced blob URL swap
// NO srcdoc (avoids re-parse on every char), uses createObjectURL
// which is fast even for 10k+ line files.
// ─────────────────────────────────────────────────────────────
let blobUrl = null;
let debounceTimer = null;
let lastCode = '';

function setStatus(s) {
  sdot.className = s;          // '' | 'loading' | 'error'
  const labels = { '': 'ready', loading: 'updating…', error: 'error' };
  stext.textContent = labels[s] ?? s;
}

function runPreview() {
  const code = view.state.doc.toString();
  if (code === lastCode) { setStatus(''); return; }
  lastCode = code;

  setStatus('loading');

  // Release old blob
  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }

  try {
    const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
    blobUrl = URL.createObjectURL(blob);
    frame.onload = () => setStatus('');
    frame.onerror = () => setStatus('error');
    frame.src = blobUrl;
  } catch(e) {
    setStatus('error');
  }
}

function onDocChange(v) {
  if (!autorunCb.checked) { setStatus(''); return; }
  setStatus('loading');
  clearTimeout(debounceTimer);
  // 500ms debounce — comfortable for typing, instant for paste
  debounceTimer = setTimeout(runPreview, 500);
}

function updateCursorInfo(v) {
  const sel = v.state.selection.main;
  const line = v.state.doc.lineAt(sel.head);
  const col = sel.head - line.from + 1;
  lineCol.textContent = `Ln ${line.number}, Col ${col}`;

  const bytes = v.state.doc.length;
  charInfo.textContent = bytes >= 1024
    ? (bytes / 1024).toFixed(1) + ' KB'

  const lc = v.state.doc.lines;

// ─────────────────────────────────────────────────────────────
// Basic HTML formatter (fast, no heavy libraries)
// ─────────────────────────────────────────────────────────────
function formatHTML(html) {
  const VOID = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
  const INLINE = new Set(['a','abbr','acronym','b','bdo','big','br','button','cite','code','dfn','em','i','img','input','kbd','label','map','object','q','samp','select','small','span','strong','sub','sup','textarea','time','tt','var']);
  const PRE = new Set(['pre','script','style','textarea']);

  let result = '';
  let depth = 0;
  let inPre = false;
  let preTag = '';

  // Split into tokens: tags, text, comments, doctype
  const tokens = html.match(/<!--[\s\S]*?-->|<!DOCTYPE[^>]*>|<\/?[a-zA-Z][^>]*\/?>|[^<]+/gi) || [];

  tokens.forEach(token => {
    const trimmed = token.trim();
    if (!trimmed) return;

    const isDoctype = /^<!DOCTYPE/i.test(trimmed);
    const isComment = /^<!--/.test(trimmed);
    const isClose   = /^<\//.test(trimmed);
    const isSelfClose = /\/>$/.test(trimmed);
    const tagMatch  = trimmed.match(/^<\/?([a-zA-Z][a-zA-Z0-9]*)/i);
    const tagName   = tagMatch ? tagMatch[1].toLowerCase() : '';
    const isVoid    = VOID.has(tagName);
    const isPre     = PRE.has(tagName);

    if (inPre) {
      result += token;
      if (isClose && tagName === preTag) { inPre = false; preTag = ''; }
      return;
    }

    if (isDoctype || isComment) {
      result += '  '.repeat(depth) + trimmed + '\n';
      return;
    }

    if (isClose) {
      depth = Math.max(0, depth - 1);
      result += '  '.repeat(depth) + trimmed + '\n';
      return;
    }

    if (!tagMatch) {
      // Text node
      const text = trimmed;
      if (text) result += '  '.repeat(depth) + text + '\n';
      return;
    }

    result += '  '.repeat(depth) + trimmed + '\n';

    if (!isVoid && !isSelfClose) {
      if (isPre) { inPre = true; preTag = tagName; }
      else { depth++; }
    }
  });

  return result.replace(/\n{3,}/g, '\n\n').trim();
}

// ─────────────────────────────────────────────────────────────
// Import HTML file
// ─────────────────────────────────────────────────────────────
const importBtn   = document.getElementById('btn-import');
const fileInput   = document.getElementById('file-import-input');

importBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;

  // Validate: must be HTML/HTM
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['html','htm'].includes(ext)) {
    showToast('Only .html / .htm files supported');
    fileInput.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const content = e.target.result;
    // Load into editor
    view.dispatch({
      changes: { from: 0, to: view.state.doc.length, insert: content }
    });
    showToast(`Imported: ${file.name}`);
    // Auto-run if enabled
    if (autorunCb.checked) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runPreview, 300);
    }
  };
  reader.onerror = () => showToast('Failed to read file');
  reader.readAsText(file, 'UTF-8');

  // Reset so same file can be re-imported
  fileInput.value = '';
});

// ─────────────────────────────────────────────────────────────
// PWA — Inline Service Worker (blob URL)
// ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const SW = `
const CDN_CACHE='liveforge-cdn-v1';
self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CDN_CACHE).map(k=>caches.delete(k))))
  .then(()=>self.clients.claim())
));
self.addEventListener('fetch',event=>{
  if(event.request.method!=='GET')return;
  const url=new URL(event.request.url);
  if(url.protocol==='blob:'||url.protocol==='data:')return;
  event.respondWith(
    caches.open(CDN_CACHE).then(async cache=>{
      const cached=await cache.match(event.request);
      try{
        const resp=await fetch(event.request);
        if(resp.ok&&resp.type!=='opaque')cache.put(event.request,resp.clone());
        return resp;
      }catch(e){
        return cached||new Response('Offline',{status:503});
      }
    })
  );
});`;
  const swUrl = URL.createObjectURL(new Blob([SW],{type:'application/javascript'}));
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register(swUrl)
      .then(()=>console.log('[SW] Registered'))
      .catch(e=>console.warn('[SW]',e));
  });
}

// ─────────────────────────────────────────────────────────────
// PWA — Install prompt
// ─────────────────────────────────────────────────────────────
let _deferredPrompt = null;
const _installBtn = document.getElementById('pwa-install-btn');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  _installBtn.classList.add('visible');
});
_installBtn.addEventListener('click', async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  showToast(outcome === 'accepted' ? 'LiveForge installed!' : 'Install cancelled');
  _deferredPrompt = null;
  _installBtn.classList.remove('visible');
});
window.addEventListener('appinstalled', () => {
  _installBtn.classList.remove('visible');
  showToast('LiveForge installed!');
});

// ─────────────────────────────────────────────────────────────
// PWA — Offline banner
// ─────────────────────────────────────────────────────────────
const _offlineBanner = document.getElementById('offline-banner');
function _updateOnline() { _offlineBanner.classList.toggle('visible', !navigator.onLine); }
window.addEventListener('online', _updateOnline);
window.addEventListener('offline', _updateOnline);
_updateOnline();

</script>
